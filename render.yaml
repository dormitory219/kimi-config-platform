services:
  # 后端 API 服务
  - type: web
    name: kimi-config-api
    runtime: docker
    rootDir: kimi-config-server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: CONFIG_REPO_PATH
        value: ./config-repo
      - key: GIN_MODE
        value: release
    healthCheckPath: /api/platforms

  # 前端静态站点 — 注意：需要先部署后端，获取实际 URL 后再填入 VITE_API_URL
  - type: static
    name: kimi-config-web
    rootDir: kimi-config-web
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        # 部署后端后，将此值替换为实际的后端 URL，例如：https://kimi-config-api-xxx.onrender.com
        value: ""